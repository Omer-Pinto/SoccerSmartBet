<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoccerSmartBet &mdash; P&amp;L Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/shared.css">
<link rel="stylesheet" href="/static/filter-builder.css">
<style>
.pnl-page-body {
  max-width: 1380px;
  margin: 0 auto;
  padding: 36px 40px 60px;
}
/* Full-width chart */
.chart-full {
  margin-bottom: 32px;
}
.chart-full .chart-svg-wrap svg {
  height: 320px;
}
/* Y-axis labels */
.y-axis-label {
  font-size: 10px;
  fill: rgba(255,255,255,0.4);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  font-variant-numeric: tabular-nums;
}
/* Zero line */
.zero-line {
  stroke: rgba(255,255,255,0.25);
  stroke-width: 1;
  stroke-dasharray: 4 3;
}
/* Grid lines */
.grid-line {
  stroke: rgba(255,255,255,0.07);
  stroke-width: 1;
}
/* Focus rings */
.filter-input:focus-visible {
  outline: 2.5px solid var(--cobalt);
  outline-offset: 2px;
}
/* Tooltip */
.chart-tooltip {
  position: absolute;
  background: rgba(20,18,93,0.97);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 6px;
  padding: 10px 14px;
  pointer-events: none;
  font-size: 12px;
  color: #fff;
  font-family: 'Space Grotesk', system-ui, sans-serif;
  font-weight: 600;
  min-width: 140px;
  display: none;
  z-index: 1000;
}
.chart-tooltip .tt-date { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 6px; letter-spacing: 0.5px; }
.chart-tooltip .tt-user { color: var(--emerald); }
.chart-tooltip .tt-ai   { color: var(--vermilion); }
</style>
</head>

<script>
// ─── Masthead ────────────────────────────────────────────────────────────────
(function () {
  const mh = document.getElementById("masthead-date");
  if (!mh) return;
  const now = new Date();
  const opts = { weekday: "long", year: "numeric", month: "long", day: "numeric",
                 timeZone: "Asia/Jerusalem" };
  const timeOpts = { hour: "2-digit", minute: "2-digit", hour12: false,
                     timeZone: "Asia/Jerusalem" };
  mh.textContent =
    now.toLocaleDateString("en-US", opts) + " · " +
    now.toLocaleTimeString("en-US", timeOpts) + " ISR";
})();

// ─── XSS helper ──────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ─── URL filter/calendar sync ─────────────────────────────────────────────────
function pushStateToUrl(dsl, calFrom, calTo) {
  const params = new URLSearchParams(window.location.search);
  if (dsl)     { params.set("filter", dsl); } else { params.delete("filter"); }
  if (calFrom) { params.set("from", calFrom); } else { params.delete("from"); }
  if (calTo)   { params.set("to",   calTo);   } else { params.delete("to"); }
  const newUrl = window.location.pathname + (params.toString() ? "?" + params.toString() : "");
  history.replaceState(null, "", newUrl);
}
// Convenience alias used by filter-only changes
function pushFilterToUrl(dsl) { pushStateToUrl(dsl, _calFrom, _calTo); }

// ─── SVG chart renderer ──────────────────────────────────────────────────────
// Design decision: zero baseline always included (see docstring in stats.py).
// Y-axis auto-scales to observed min/max plus some padding,
// always encompassing zero.

const SVG_W = 1000;
const SVG_H = 260;
const PAD_L = 70;
const PAD_R = 20;
const PAD_T = 16;
const PAD_B = 20;
const PLOT_W = SVG_W - PAD_L - PAD_R;
const PLOT_H = SVG_H - PAD_T - PAD_B;

const EMERALD    = "#00a85a";
const VERMILION  = "#f26130";

function pnlSign(v) { return v >= 0 ? "+" : ""; }

function buildSvg(points) {
  if (!points || points.length === 0) {
    return `<svg viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg">
      <text x="${SVG_W/2}" y="${SVG_H/2}" text-anchor="middle" fill="rgba(255,255,255,0.3)"
            font-family="Space Grotesk, sans-serif" font-size="14">No data for this filter</text>
    </svg>`;
  }

  // Gather values
  const userVals = points.map(p => p.cumulative_user);
  const aiVals   = points.map(p => p.cumulative_ai);
  const allVals  = [...userVals, ...aiVals, 0]; // zero always included

  let yMin = Math.min(...allVals);
  let yMax = Math.max(...allVals);

  // Ensure range is non-zero
  if (yMin === yMax) { yMin -= 1; yMax += 1; }

  // 5% padding above/below
  const pad = (yMax - yMin) * 0.05;
  yMin -= pad;
  yMax += pad;

  const n = points.length;

  function xOf(i) { return PAD_L + (i / Math.max(n - 1, 1)) * PLOT_W; }
  function yOf(v) { return PAD_T + PLOT_H - ((v - yMin) / (yMax - yMin)) * PLOT_H; }

  // Grid lines + y-axis labels (5 levels)
  let gridLines = "";
  let yLabels   = "";
  const steps = 5;
  for (let s = 0; s <= steps; s++) {
    const v = yMin + (s / steps) * (yMax - yMin);
    const y = yOf(v);
    gridLines += `<line class="grid-line" x1="${PAD_L}" y1="${y}" x2="${SVG_W - PAD_R}" y2="${y}"/>`;
    yLabels   += `<text class="y-axis-label" x="${PAD_L - 6}" y="${y + 3.5}" text-anchor="end">${pnlSign(v)}${v.toFixed(0)}</text>`;
  }

  // Zero line
  const zeroY = yOf(0);
  const zeroLine = `<line class="zero-line" x1="${PAD_L}" y1="${zeroY}" x2="${SVG_W - PAD_R}" y2="${zeroY}"/>`;

  // Polyline data
  function polyline(vals, color) {
    const pts = vals.map((v, i) => `${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(" ");
    return `<polyline fill="none" stroke="${color}" stroke-width="2.5"
                      stroke-linejoin="round" stroke-linecap="round"
                      points="${pts}"/>`;
  }

  // Invisible hover targets (vertical bars per point)
  // Attach data-index so JS tooltip can read
  const barW = Math.max(6, PLOT_W / n);
  const hitBars = points.map((p, i) => {
    const cx = xOf(i);
    const uVal = p.cumulative_user.toFixed(2);
    const aVal = p.cumulative_ai.toFixed(2);
    return `<rect class="chart-hit" x="${(cx - barW/2).toFixed(1)}" y="${PAD_T}"
                  width="${barW.toFixed(1)}" height="${PLOT_H}"
                  fill="transparent" data-index="${i}"
                  tabindex="0" role="img"
                  aria-label="${p.date}: User ${uVal}, AI ${aVal}"
                  style="cursor:crosshair;"/>`;
  }).join("");

  return `<svg viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg"
               id="pnl-svg" style="width:100%;height:320px;overflow:visible;">
    ${gridLines}
    ${yLabels}
    ${zeroLine}
    ${polyline(userVals, EMERALD)}
    ${polyline(aiVals, VERMILION)}
    ${hitBars}
  </svg>`;
}

function buildXLabels(points) {
  if (!points || points.length === 0) return "";
  const n = points.length;
  // Show up to 7 labels evenly spaced
  const maxLabels = 7;
  const step = Math.max(1, Math.floor(n / maxLabels));
  const indices = [];
  for (let i = 0; i < n; i += step) indices.push(i);
  if (indices[indices.length - 1] !== n - 1) indices.push(n - 1);

  return indices.map(i => {
    const d = points[i].date;
    const label = d.slice(5); // MM-DD
    return `<span class="chart-x-label">${label}</span>`;
  }).join("");
}

// ─── Tooltip ─────────────────────────────────────────────────────────────────
let _tooltipPoints = [];

function showTooltipForIndex(idx, anchorEl) {
  const tooltip = document.getElementById("chart-tooltip");
  const p = _tooltipPoints[idx];
  if (!p || !tooltip) return;
  tooltip.innerHTML =
    `<div class="tt-date">${escHtml(p.date)}</div>` +
    `<div class="tt-user">User: ${pnlSign(p.cumulative_user)}${p.cumulative_user.toFixed(2)}</div>` +
    `<div class="tt-ai">AI: ${pnlSign(p.cumulative_ai)}${p.cumulative_ai.toFixed(2)}</div>`;
  tooltip.style.display = "block";

  // Position near the anchor element when keyboard-triggered (anchorEl provided)
  if (anchorEl) {
    const wrap = document.getElementById("chart-wrap");
    const wrapRect = wrap.getBoundingClientRect();
    const barRect  = anchorEl.getBoundingClientRect();
    const ttW = tooltip.offsetWidth  || 160;
    let left = barRect.left - wrapRect.left + barRect.width / 2 - ttW / 2;
    let top  = barRect.top  - wrapRect.top  - (tooltip.offsetHeight || 70) - 8;
    left = Math.max(0, Math.min(left, wrapRect.width - ttW));
    if (top < 0) top = barRect.bottom - wrapRect.top + 4;
    tooltip.style.left = left + "px";
    tooltip.style.top  = top  + "px";
  }
}

function hideTooltip() {
  const tooltip = document.getElementById("chart-tooltip");
  if (tooltip) tooltip.style.display = "none";
}

function attachTooltip() {
  const svgEl = document.getElementById("pnl-svg");
  const tooltip = document.getElementById("chart-tooltip");
  if (!svgEl || !tooltip) return;

  // Build a stable ordered array of all hit-rects so keyboard nav can jump by
  // index rather than relying on DOM siblings (which include polylines, etc.).
  const hitRects = Array.from(svgEl.querySelectorAll(".chart-hit"));

  hitRects.forEach(bar => {
    // Mouse
    bar.addEventListener("mouseenter", () => {
      showTooltipForIndex(parseInt(bar.dataset.index, 10), null);
    });
    bar.addEventListener("mousemove", evt => {
      const wrap = document.getElementById("chart-wrap");
      const rect = wrap.getBoundingClientRect();
      const ttW = tooltip.offsetWidth  || 160;
      const ttH = tooltip.offsetHeight || 70;

      let left = evt.clientX - rect.left + 12;
      let top  = evt.clientY - rect.top  - 20;

      if (left + ttW > rect.width)  left = evt.clientX - rect.left - ttW - 12;
      if (top  + ttH > rect.height) top  = evt.clientY - rect.top  - ttH - 4;
      if (top < 0) top = 4;

      tooltip.style.left = left + "px";
      tooltip.style.top  = top  + "px";
    });
    bar.addEventListener("mouseleave", hideTooltip);

    // Keyboard: use index-based navigation on the cached hitRects array so that
    // ArrowLeft/Right always land on another focusable rect, never on a polyline.
    bar.addEventListener("focus", () => {
      showTooltipForIndex(parseInt(bar.dataset.index, 10), bar);
    });
    bar.addEventListener("blur", hideTooltip);
    bar.addEventListener("keydown", e => {
      const idx = parseInt(bar.dataset.index, 10);
      if (e.key === "ArrowLeft") {
        e.preventDefault();
        const target = hitRects[Math.max(0, idx - 1)];
        if (target) target.focus();
      }
      if (e.key === "ArrowRight") {
        e.preventDefault();
        const target = hitRects[Math.min(hitRects.length - 1, idx + 1)];
        if (target) target.focus();
      }
    });
  });
}

// ─── Fetch & render ──────────────────────────────────────────────────────────
let _pnlReqGen = 0; // monotonic counter — stale responses are discarded

async function fetchAndRender(dsl) {
  const myGen = ++_pnlReqGen;
  const container = document.getElementById("svg-container");

  // Reset aggregates immediately so previous values don't linger on error
  document.getElementById("agg-points"   ).innerHTML = `<span class="sub">&mdash;</span>`;
  document.getElementById("agg-user-final").innerHTML = `<span class="sub">&mdash;</span>`;
  document.getElementById("agg-ai-final"  ).innerHTML = `<span class="sub">&mdash;</span>`;
  document.getElementById("agg-range"     ).innerHTML = `<span class="sub">&mdash;</span>`;

  // Tooltip is outside svg-container — never touch it here
  container.innerHTML = `<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.35);font-family:var(--font-body);">Loading&hellip;</div>`;
  document.getElementById("x-labels").innerHTML = "";

  // Tab title reflects active filter state
  document.title = dsl ? "P&L (filtered) · SoccerSmartBet" : "SoccerSmartBet — P&L Chart";

  // Build URL with DSL + calendar date range merged.
  // If the typed DSL already contains a date: token, calendar clauses are skipped
  // to prevent duplicate date: keys reaching the server (undefined behaviour).
  let effectiveDsl = dsl;
  const _dslHasDate = /(?:^|\s)date:/i.test(dsl);
  if ((_calFrom || _calTo) && !_dslHasDate) {
    let dateClause = "";
    if (_calFrom && _calTo) {
      dateClause = `date:>=${_calFrom},<=${_calTo}`;
    } else if (_calFrom) {
      dateClause = `date:>=${_calFrom}`;
    } else {
      dateClause = `date:<=${_calTo}`;
    }
    effectiveDsl = dsl ? `${dsl} ${dateClause}` : dateClause;
  } else if ((_calFrom || _calTo) && _dslHasDate) {
    console.warn("pnl: typed DSL contains date: — calendar range ignored to avoid duplicate date: clauses");
  }
  let url = "/api/pnl";
  if (effectiveDsl) url += "?filter=" + encodeURIComponent(effectiveDsl);

  let data;
  try {
    const resp = await fetch(url);
    if (myGen !== _pnlReqGen) return; // stale — a newer request overtook this one
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      const msg = err.detail?.detail || err.detail || "Request failed";
      const errDiv = document.createElement("div");
      errDiv.className = "error-state";
      errDiv.textContent = msg; // textContent — safe, no XSS
      container.innerHTML = "";
      container.appendChild(errDiv);
      const _ibErr = document.getElementById("btn-insight");
      if (_ibErr) _ibErr.disabled = true;
      return;
    }
    data = await resp.json();
  } catch (e) {
    if (myGen !== _pnlReqGen) return;
    const errDiv = document.createElement("div");
    errDiv.className = "error-state";
    errDiv.textContent = "Network error: " + e.message;
    container.innerHTML = "";
    container.appendChild(errDiv);
    const _ibNet = document.getElementById("btn-insight");
    if (_ibNet) _ibNet.disabled = true;
    return;
  }
  if (myGen !== _pnlReqGen) return; // check again after async work

  const points = data.points || [];
  _tooltipPoints = points;

  // Enable insight button whenever there is data to analyse (mirrors history/team/league pages)
  const _insightBtn = document.getElementById("btn-insight");
  if (_insightBtn) _insightBtn.disabled = (points.length === 0);

  // Aggregates strip
  document.getElementById("agg-points").textContent = points.length;

  if (points.length > 0) {
    const last = points[points.length - 1];
    const userFin = last.cumulative_user;
    const aiFin   = last.cumulative_ai;
    const uEl = document.getElementById("agg-user-final");
    const aEl = document.getElementById("agg-ai-final");
    uEl.innerHTML = `<span class="${userFin >= 0 ? 'pos' : 'neg'}">${pnlSign(userFin)}${userFin.toFixed(2)}</span>`;
    aEl.innerHTML = `<span class="${aiFin   >= 0 ? 'pos' : 'neg'}">${pnlSign(aiFin  )}${aiFin.toFixed(2)}</span>`;
    document.getElementById("agg-range").innerHTML =
      `<span class="sub">${escHtml(points[0].date.slice(5))} &rarr; ${escHtml(last.date.slice(5))}</span>`;
  } else {
    document.getElementById("agg-user-final").innerHTML = `<span class="sub">&mdash;</span>`;
    document.getElementById("agg-ai-final"  ).innerHTML = `<span class="sub">&mdash;</span>`;
    document.getElementById("agg-range"     ).innerHTML = `<span class="sub">&mdash;</span>`;
  }

  // Build SVG — tooltip div is outside the container, so no recreation needed
  container.innerHTML = buildSvg(points);
  document.getElementById("x-labels").innerHTML = buildXLabels(points);
  attachTooltip();

  // Row cap warning banner
  const existing = document.getElementById("row-cap-banner");
  if (existing) existing.remove();
  if (data.row_cap_hit) {
    const banner = document.createElement("div");
    banner.id = "row-cap-banner";
    banner.className = "row-cap-banner";
    banner.textContent =
      "Showing partial results — filter matched >2000 bets. Tighten your filter to see the full series.";
    const chartSection = document.querySelector(".chart-full");
    chartSection.parentNode.insertBefore(banner, chartSection);
  }
}

let _debounceTimer = null;
let _calFrom = "";
let _calTo   = "";
let _insightPollTimer = null;
let _insightToken = 0;

function onFilterChange(dsl) {
  clearTimeout(_debounceTimer);
  if (dsl === undefined) {
    dsl = (document.getElementById("filter-input").value || "").trim();
  }
  pushStateToUrl(dsl, _calFrom, _calTo);
  _debounceTimer = setTimeout(() => fetchAndRender(dsl), 350);
}

function onCalendarChange() {
  clearTimeout(_debounceTimer);
  _calFrom = (document.getElementById("cal-from") || {}).value || "";
  _calTo   = (document.getElementById("cal-to")   || {}).value || "";
  const dsl = (document.getElementById("filter-input").value || "").trim();
  pushStateToUrl(dsl, _calFrom, _calTo);
  _debounceTimer = setTimeout(() => fetchAndRender(dsl), 350);
}

document.getElementById("cal-from").addEventListener("change", onCalendarChange);
document.getElementById("cal-to"  ).addEventListener("change", onCalendarChange);

// ─── Insight helpers ─────────────────────────────────────────────────────────
function stopInsightPoll() {
  _insightToken++;
  if (_insightPollTimer) { clearInterval(_insightPollTimer); _insightPollTimer = null; }
}

function setInsightBtnState(generating) {
  const btn = document.getElementById("btn-insight");
  if (!btn) return;
  btn.disabled = generating;
  btn.textContent = generating ? "Generating…" : "Generate Insight";
}

/**
 * Minimal Markdown → HTML converter for AI insight output.
 * Processing order: escape HTML → fenced code blocks → headings/lists → inline.
 * Headers map to h3/h4/h5 so they don't outrank the page's section labels.
 */
function simpleMarkdown(md) {
  if (!md) return "";

  const esc = s => String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");

  let text = esc(md);

  const codeBlocks = [];
  text = text.replace(/```[^\n]*\n([\s\S]*?)```/g, (_, inner) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code>${inner}</code></pre>`);
    return `\x00CODEBLOCK${idx}\x00`;
  });

  const inlineTransform = s => {
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/__(.+?)__/g, "<strong>$1</strong>");
    s = s.replace(/\*(\S(?:[^*\n]*?\S)?)\*/g, "<em>$1</em>");
    s = s.replace(/\b_(\S[^_\n]*?\S)_\b/g, "<em>$1</em>");
    return s;
  };

  const lines = text.split("\n");
  const out = [];
  let inUl = false, inOl = false;

  const closeList = () => {
    if (inUl) { out.push("</ul>"); inUl = false; }
    if (inOl) { out.push("</ol>"); inOl = false; }
  };

  lines.forEach(line => {
    const h1 = line.match(/^# (.+)$/);
    const h2 = line.match(/^## (.+)$/);
    const h3 = line.match(/^### (.+)$/);
    if (h3)      { closeList(); out.push(`<h5>${inlineTransform(h3[1])}</h5>`); return; }
    if (h2)      { closeList(); out.push(`<h4>${inlineTransform(h2[1])}</h4>`); return; }
    if (h1)      { closeList(); out.push(`<h3>${inlineTransform(h1[1])}</h3>`); return; }

    const ulItem = line.match(/^[-*] (.+)$/);
    if (ulItem) {
      if (inOl) { out.push("</ol>"); inOl = false; }
      if (!inUl) { out.push("<ul>"); inUl = true; }
      out.push(`<li>${inlineTransform(ulItem[1])}</li>`);
      return;
    }

    const olItem = line.match(/^\d+\. (.+)$/);
    if (olItem) {
      if (inUl) { out.push("</ul>"); inUl = false; }
      if (!inOl) { out.push("<ol>"); inOl = true; }
      out.push(`<li>${inlineTransform(olItem[1])}</li>`);
      return;
    }

    closeList();

    if (line.trim() === "") { out.push("<p></p>"); return; }
    out.push(inlineTransform(line));
  });

  closeList();

  text = out.join("\n");
  text = text.replace(/\x00CODEBLOCK(\d+)\x00/g, (_, i) => codeBlocks[parseInt(i, 10)]);
  text = text.replace(/\n/g, "<br>");
  return text;
}

async function pollInsightJob(jobId) {
  const insightBody = document.getElementById("insight-body");
  const insightStat = document.getElementById("insight-status");
  stopInsightPoll();
  if (insightStat) insightStat.textContent = "Queued";
  if (insightBody) { insightBody.className = "insight-panel-body loading"; insightBody.textContent = "Waiting for AI analysis..."; }

  const myToken = ++_insightToken;
  _insightPollTimer = setInterval(async () => {
    let resp;
    try { resp = await fetch(`/api/insights/${jobId}`); }
    catch (e) {
      if (myToken !== _insightToken) return;
      stopInsightPoll();
      if (insightStat) insightStat.textContent = "Error";
      if (insightBody) { insightBody.className = "insight-panel-body error"; insightBody.textContent = "Network error polling insight."; }
      setInsightBtnState(false);
      return;
    }
    if (myToken !== _insightToken) return;
    if (!resp.ok) {
      stopInsightPoll();
      if (insightStat) insightStat.textContent = "Error";
      if (insightBody) { insightBody.className = "insight-panel-body error"; insightBody.textContent = `Error ${resp.status} polling insight job.`; }
      setInsightBtnState(false);
      return;
    }
    const job = await resp.json();
    if (myToken !== _insightToken) return;
    if (insightStat) insightStat.textContent = job.state.toUpperCase();
    if (job.state === "done") {
      stopInsightPoll();
      const md = (job.markdown || "").trim();
      if (insightBody) {
        insightBody.className = "insight-panel-body";
        insightBody.innerHTML = md ? simpleMarkdown(md) : "<em>No insight returned.</em>";
      }
      setInsightBtnState(false);
    } else if (job.state === "failed") {
      stopInsightPoll();
      if (insightBody) { insightBody.className = "insight-panel-body error"; insightBody.textContent = job.error || "Insight generation failed."; }
      setInsightBtnState(false);
    }
  }, 2500);
}

// Restore focus after closing the insight panel without causing a scroll jump.
function restoreInsightFocus() {
  const panel    = document.getElementById("insight-panel");
  const prevId   = panel?.dataset.prevFocus || "";
  const prevEl   = prevId ? document.getElementById(prevId) : null;
  const fallback = document.getElementById("btn-insight");
  const target   = (prevEl && !panel?.contains(prevEl)) ? prevEl : fallback;
  target?.focus({ preventScroll: true });
}

// ─── Insight click handler ───────────────────────────────────────────────────
document.getElementById("btn-insight").addEventListener("click", async () => {
  const typedDsl = (document.getElementById("filter-input").value || "").trim();

  // Merge calendar date range into the DSL so the AI only analyses
  // what the user is looking at, not the whole DB.
  // Guard: if the typed DSL already contains a date: clause, skip calendar
  // date injection to avoid duplicate/conflicting date: clauses.
  let effectiveDsl = typedDsl;
  const calFromVal = (_calFrom || "").trim();
  const calToVal   = (_calTo   || "").trim();
  const _dslHasDate = /(?:^|\s)date:/i.test(typedDsl);
  if ((calFromVal || calToVal) && !_dslHasDate) {
    let dateClause = "";
    if (calFromVal && calToVal) {
      dateClause = `date:>=${calFromVal},<=${calToVal}`;
    } else if (calFromVal) {
      dateClause = `date:>=${calFromVal}`;
    } else {
      dateClause = `date:<=${calToVal}`;
    }
    effectiveDsl = typedDsl ? `${typedDsl} ${dateClause}` : dateClause;
  } else if ((calFromVal || calToVal) && _dslHasDate) {
    console.warn("pnl insight: typed DSL contains date: — calendar range ignored to avoid duplicate date: clauses");
  }

  // Evaluated-only guard: clamp upper bound to yesterday-ISR when no explicit
  // date:<= is present, to avoid including pending/unresolved bets from today.
  const _todayISR = new Date().toLocaleDateString("sv-SE", { timeZone: "Asia/Jerusalem" });
  const [_gy, _gm, _gd] = _todayISR.split("-").map(Number);
  const _guardYesterday = new Date(_gy, _gm - 1, _gd - 1);
  const _yStr = `${_guardYesterday.getFullYear()}-${String(_guardYesterday.getMonth()+1).padStart(2,"0")}-${String(_guardYesterday.getDate()).padStart(2,"0")}`;
  if (!_dslHasDate) {
    const _hasUpper = /\bdate:<=/.test(effectiveDsl);
    const _calToFuture = calToVal && calToVal > _yStr;
    if (!_hasUpper || _calToFuture) {
      console.warn("Insight: appending evaluated-only guard date:<=", _yStr);
      effectiveDsl = effectiveDsl.replace(/\bdate:<=\S+/g, "").trim();
      effectiveDsl = effectiveDsl ? `${effectiveDsl} date:<=${_yStr}` : `date:<=${_yStr}`;
    }
  }

  const insightPanel = document.getElementById("insight-panel");
  const insightBody  = document.getElementById("insight-body");
  const insightStat  = document.getElementById("insight-status");
  if (insightPanel) insightPanel.dataset.prevFocus = document.activeElement?.id || "";
  stopInsightPoll();
  if (insightPanel) insightPanel.style.display = "block";
  if (insightStat)  insightStat.textContent = "Starting";
  if (insightBody)  { insightBody.className = "insight-panel-body loading"; insightBody.textContent = "Submitting insight request..."; }
  setInsightBtnState(true);

  let resp;
  try {
    resp = await fetch("/api/insights", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filter_dsl: effectiveDsl }),
    });
  } catch (e) {
    if (insightBody) { insightBody.className = "insight-panel-body error"; insightBody.textContent = "Network error submitting insight request."; }
    setInsightBtnState(false);
    return;
  }

  if (resp.status === 422) {
    if (insightPanel) insightPanel.style.display = "none";
    setInsightBtnState(false);
    return;
  }
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    if (insightBody) { insightBody.className = "insight-panel-body error"; insightBody.textContent = err.detail || `Error ${resp.status}`; }
    setInsightBtnState(false);
    return;
  }

  const { job_id } = await resp.json();
  pollInsightJob(job_id);
});

// Wire insight panel close button
(function () {
  const closeBtn = document.getElementById("insight-close");
  const panel    = document.getElementById("insight-panel");
  if (closeBtn && panel) {
    closeBtn.addEventListener("click", () => {
      stopInsightPoll();
      panel.style.display = "none";
      setInsightBtnState(false);
      restoreInsightFocus();
    });
  }
})();

// Escape closes the insight panel (document-level; skips when focus is in a text input)
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  const tag = (e.target.tagName || "").toUpperCase();
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  const panel = document.getElementById("insight-panel");
  if (panel && panel.style.display !== "none") {
    stopInsightPoll();
    panel.style.display = "none";
    setInsightBtnState(false);
    restoreInsightFocus();
  }
});

// Init — restore calendar from URL; filter builder handles DSL
(function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const initialFrom = urlParams.get("from") || "";
  const initialTo   = urlParams.get("to")   || "";

  const ISO_DATE = /^\d{4}-\d{2}-\d{2}$/;
  if (initialFrom && ISO_DATE.test(initialFrom)) {
    _calFrom = initialFrom;
    const el = document.getElementById("cal-from");
    if (el) el.value = initialFrom;
  }
  if (initialTo && ISO_DATE.test(initialTo)) {
    _calTo = initialTo;
    const el = document.getElementById("cal-to");
    if (el) el.value = initialTo;
  }
  // fetchAndRender called from module script after builder init
})();
</script>

<script type="module">
import { createFilterBuilder } from "/static/filter-builder.js";

(function initFilterBuilder() {
  const urlParams = new URLSearchParams(window.location.search);
  const initialDsl = urlParams.get("filter") || "";

  window._fb = createFilterBuilder({
    container:   document.getElementById("fb-container"),
    enabledKeys: ["league","team","date","month","stake","odds","outcome","bettor","prediction","result"],
    initialDsl,
    hiddenInput: document.getElementById("filter-input"),
    onChange: (dsl) => {
      onFilterChange(dsl);
    },
  });

  fetchAndRender(initialDsl);
})();
</script>
